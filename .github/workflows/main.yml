name: Generate Stats Images

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run checks
        run: make check

      - name: Generate images
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: make generate

      - name: Commit generated SVGs
        run: |
          git config --global user.name "agoodkind-gh-bot"
          git config --global user.email "gh-bots@goodkind.io"
          git add generated
          git commit -m "Update generated SVGs" || true
          git push
