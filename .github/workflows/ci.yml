name: CI

on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    uses: agoodkind/go-makefile/.github/workflows/_ci.yml@main
    permissions:
      contents: read
      id-token: write
