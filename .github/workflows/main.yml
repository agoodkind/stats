name: Generate Stats Images

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-only: true

      - name: Run checks
        run: make check

      - name: Generate images
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: make generate

      - name: Commit generated SVGs
        run: |
          set -x
          git -C "$GITHUB_WORKSPACE" config --global user.name "agoodkind-gh-bot"
          git -C "$GITHUB_WORKSPACE" config --global user.email "gh-bots@goodkind.io"
          git -C "$GITHUB_WORKSPACE" status --short generated
          git -C "$GITHUB_WORKSPACE" add generated
          if git -C "$GITHUB_WORKSPACE" diff --cached --quiet; then
            echo "no SVG changes to commit"
            exit 0
          fi
          git -C "$GITHUB_WORKSPACE" diff --cached --stat
          git -C "$GITHUB_WORKSPACE" commit -m "Update generated SVGs"
          git -C "$GITHUB_WORKSPACE" push origin HEAD:master
