<svg id="gh-dark-mode-only" width="360" height="314" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: white;
  stroke: rgb(225, 228, 232);
  stroke-width: 1px;
  rx: 6px;
  ry: 6px;
}

#gh-dark-mode-only:target #background {
  fill: #0d1117;
  stroke-width: 0.5px;
}

foreignObject {
  width: calc(100% - 10px - 32px);
  height: calc(100% - 10px - 32px);
}

.title {
  font-size: 14px;
  font-weight: 600;
  color: rgb(3, 102, 214);
  padding: 0 0 0.5em 0.25em;
}

#gh-dark-mode-only:target .title {
  color: #58a6ff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.card {
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  border: 1px solid rgb(225, 228, 232);
  border-radius: 6px;
  padding: 6px 8px;
  gap: 2px;
  height: 74px;
  min-width: 0;
  overflow: hidden;
  transform: translateX(-200%);
  animation: slideIn 1.6s ease-in-out forwards;
}

#gh-dark-mode-only:target .card {
  border-color: #30363d;
}

.card .name {
  font-weight: 600;
  font-size: 12px;
  color: rgb(36, 41, 46);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#gh-dark-mode-only:target .card .name {
  color: #c9d1d9;
}

.card .desc {
  color: rgb(106, 115, 125);
  font-size: 10px;
  line-height: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#gh-dark-mode-only:target .card .desc {
  color: #8b949e;
}

.card .stats {
  color: rgb(106, 115, 125);
  font-size: 11px;
  margin-top: auto;
}

#gh-dark-mode-only:target .card .stats {
  color: #8b949e;
}

.pill {
  display: inline-block;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 5px;
}

@keyframes slideIn {
  to {
    transform: translateX(0);
  }
}
</style>
<g>
<rect x="5" y="5" id="background" />
<g>
<foreignObject x="21" y="21" width="318" height="272">
